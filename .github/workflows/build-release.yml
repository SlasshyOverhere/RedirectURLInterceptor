name: Build and Release Slasshy Url Interceptor

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PROJECT_PATH: RedirectUrlInterceptor/RedirectUrlInterceptor.csproj
      PUBLISH_DIR: RedirectUrlInterceptor/out/publish
      APP_EXE_PATH: RedirectUrlInterceptor/out/publish/SlasshyUrlInterceptor.exe
      ZIP_PATH: RedirectUrlInterceptor/out/SlasshyUrlInterceptor-win-x64.zip
      CHECKSUM_PATH: RedirectUrlInterceptor/out/SlasshyUrlInterceptor.exe.sha256
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine build version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not "${{ github.ref }}".StartsWith("refs/tags/")) {
            $run = [int]"${{ github.run_number }}"
            if ($run -gt 65535) {
              $run = $run % 65535
            }
            $tag = "v0.0.$run"
          }

          $version = $tag.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Tag '$tag' must use numeric semantic version format, e.g. v1.2.3"
          }

          if ($version.Split('.').Count -eq 3) {
            $version = "$version.0"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Using assembly version $version from $tag"

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        shell: pwsh
        run: |
          dotnet build $env:PROJECT_PATH `
            -c Release `
            --no-restore `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:FileVersion=${{ steps.version.outputs.version }} `
            /p:InformationalVersion=${{ steps.version.outputs.tag }}

      - name: Publish EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:PUBLISH_DIR -Force | Out-Null
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:FileVersion=${{ steps.version.outputs.version }} `
            /p:InformationalVersion=${{ steps.version.outputs.tag }} `
            -o $env:PUBLISH_DIR

      - name: Create ZIP package
        shell: pwsh
        run: |
          if (Test-Path $env:ZIP_PATH) {
            Remove-Item $env:ZIP_PATH -Force
          }
          Compress-Archive -Path "$env:PUBLISH_DIR/*" -DestinationPath $env:ZIP_PATH -CompressionLevel Optimal

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path $env:APP_EXE_PATH -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $env:CHECKSUM_PATH -Value "$hash  SlasshyUrlInterceptor.exe" -NoNewline

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlasshyUrlInterceptor-win-x64
          path: |
            ${{ env.ZIP_PATH }}
            ${{ env.APP_EXE_PATH }}
            ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error

      - name: Compute release metadata
        if: startsWith(github.ref, 'refs/tags/')
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $isEarlyBeta = $tag -match '^v0\.'
          "prerelease=false" >> $env:GITHUB_OUTPUT

          if ($isEarlyBeta) {
            "release_name=Slasshy Url Interceptor $tag (Early Beta)" >> $env:GITHUB_OUTPUT
            "channel=Early Beta" >> $env:GITHUB_OUTPUT
          } else {
            "release_name=Slasshy Url Interceptor $tag" >> $env:GITHUB_OUTPUT
            "channel=Stable" >> $env:GITHUB_OUTPUT
          }

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $currentTag = "${{ github.ref_name }}"
          git fetch --tags --force

          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$currentTag^" 2>$null).Trim()
          } catch {
            $previousTag = $null
          }

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = $currentTag
          } else {
            $range = "$previousTag..$currentTag"
          }

          $changes = git log --no-merges --pretty=format:"- %s (%h)" $range
          if (-not $changes) {
            $changes = "- Internal maintenance and build pipeline updates."
          }

          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $channel = "${{ steps.release_meta.outputs.channel }}"
          $notes = @"
          ## Slasshy Url Interceptor $currentTag

          ### Release Channel
          - $channel

          ### What's Updated
          $changes

          ### Build Output
          - `SlasshyUrlInterceptor.exe` (win-x64, self-contained, single-file)
          - `SlasshyUrlInterceptor-win-x64.zip` (full publish folder)
          - `SlasshyUrlInterceptor.exe.sha256` (integrity checksum)

          ### Build Metadata
          - Commit: $shortSha
          - Workflow: `${{ github.workflow }}`
          - Run: `${{ github.run_number }}`
          "@

          $notes | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          body_path: release-notes.md
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.APP_EXE_PATH }}
            ${{ env.CHECKSUM_PATH }}

      - name: Verify release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod -Uri $url -Headers $headers -Method Get
          if (-not $release -or -not $release.id) {
            throw "Release verification failed for tag $tag."
          }
          Write-Host "Verified release id $($release.id) for $tag."
